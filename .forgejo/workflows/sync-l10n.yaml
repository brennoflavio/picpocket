name: Sync l10n repo

on:
  push:
    branches:
      - master

enable-email-notifications: true

permissions:
  contents: read

concurrency:
  group: sync-l10n-master
  cancel-in-progress: false

jobs:
  sync-l10n:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Clone l10n repository
        env:
          L10N_REPO_TOKEN: ${{ secrets.L10N_REPO_TOKEN }}
        run: |
          set -eu
          git clone "https://x-access-token:${L10N_REPO_TOKEN}@github.com/brennoflavio/picpocket-l10n.git" l10n

      - name: Prepare master branch
        working-directory: l10n
        run: |
          set -eu
          if git show-ref --verify --quiet refs/remotes/origin/master; then
            git checkout -B master origin/master
          else
            git checkout -B master
          fi

      - name: Sync POT files
        run: |
          set -eu
          mkdir -p l10n/po
          find l10n/po -maxdepth 1 -type f -name '*.pot' -delete

          found_files=false
          for file in po/*.pot; do
            if [ ! -e "$file" ]; then
              continue
            fi

            found_files=true
            cp "$file" l10n/po/
          done

          if [ "$found_files" = false ]; then
            echo "No POT files found in source repository"
          fi

      - name: Commit and push changes
        working-directory: l10n
        run: |
          set -eu
          if [ -z "$(git status --porcelain)" ]; then
            echo "No POT changes to sync"
            exit 0
          fi

          git config user.name "PickPocket Sync Bot"
          git config user.email "contato@brennoflavio.com.br"
          git add -A po
          git commit -m "Sync translations from picpocket"
          git push origin HEAD:master
